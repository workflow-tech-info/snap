<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B68FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00C972" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Layer: Base Paths -->
  <g id="flow-paths" opacity="0.4">
    <path d="M 150 100 C 250 100, 300 50, 400 100 C 500 150, 600 50, 700 100" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4 4" />
  </g>

  <!-- Layer: Vehicle Node -->
  <g id="node-vehicle" transform="translate(100, 100)">
    <circle cx="0" cy="0" r="24" fill="#0B1220" stroke="#0B68FF" stroke-width="4" />
    <text x="0" y="5" fill="#E6EEF8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">CAR</text>
  </g>

  <!-- Layer: Snap Device Node -->
  <g id="node-snap" transform="translate(400, 100)">
    <circle cx="0" cy="0" r="32" fill="#0B1220" stroke="url(#glow)" stroke-width="4" />
    <text x="0" y="5" fill="#E6EEF8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">SNAP</text>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00C972" stroke-width="1" opacity="0.5" stroke-dasharray="2 2" />
  </g>

  <!-- Layer: Cloud / Dashboard Panels -->
  <g id="node-cloud" transform="translate(700, 100)">
    <circle cx="0" cy="0" r="24" fill="#0B1220" stroke="#00C972" stroke-width="4" />
    <text x="0" y="5" fill="#E6EEF8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">CLOUD</text>
  </g>
  
  <!-- Layer: Data Packets (For Motion Design reference) -->
  <g id="packets">
    <circle cx="250" cy="80" r="4" fill="#0B68FF" />
    <circle cx="550" cy="120" r="4" fill="#00C972" />
  </g>
</svg>
